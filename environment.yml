# Conda 环境：autosim — Python 3.10 + CUDA 12.1 + PyTorch 2.4（与 milestone_1_plan 任务 0.1 对齐）
# GPU：A800（Ampere sm_80）与 GeForce RTX 3080 Ti（sm_86）均使用同一套 PyTorch cu121 构建，无需 sm_90 源码编译。
#
# 若 conda/pytorch.org/HuggingFace 等下载缓慢或不稳定，可参考仓库内 others/netconfig.txt：
# 将 DNS 主备设为 100.90.90.90 / 100.90.90.100（Ubuntu 可用 netplan 持久化），再执行下方命令。
#
#   conda env create -f environment.yml
#   conda activate autosim
#   pip install -e ".[dev]"

name: autosim
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pytorch>=2.4,<2.5
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - pip
  - pip:
      - -e .[dev]
